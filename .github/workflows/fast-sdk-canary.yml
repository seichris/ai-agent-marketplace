name: Fast SDK Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: fast-sdk-canary
  cancel-in-progress: false

jobs:
  refresh-fast-sdk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh Fast SDK packages to latest
        run: >
          npm install
          @fastxyz/fast-connector@latest
          @fastxyz/sdk@latest
          @fastxyz/x402-client@latest
          @fastxyz/x402-facilitator@latest
          @fastxyz/x402-server@latest

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: refresh Fast SDK dependencies"
          title: "chore: refresh Fast SDK dependencies"
          body: |
            Automated Fast SDK canary update.

            This PR was created by the scheduled canary workflow after:
            - updating the Fast SDK dependency set to `latest`
            - running `npm test`
            - running `npm run build`
          branch: automation/fast-sdk-canary
          delete-branch: true
